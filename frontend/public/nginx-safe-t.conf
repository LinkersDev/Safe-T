server {
    listen 80;
    server_name safe-t-app.site www.safe-t-app.site;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name safe-t-app.site www.safe-t-app.site;

    # SSL certificates — update these paths to your actual cert files
    ssl_certificate     /etc/ssl/certs/safe-t-app.crt;
    ssl_certificate_key /etc/ssl/private/safe-t-app.key;

    # Root — point this to wherever your dist/ folder is on the server
    root /var/www/safe-t-app/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ---------------------------------------------------------------
    # SPA ROUTING FIX
    # Without this, refreshing /dashboard returns a 404 from nginx
    # because there is no physical file at that path.
    # This tells nginx: try the file, try as directory, fall back to
    # index.html and let React Router handle the route.
    # ---------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (hashed filenames from Vite build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}
